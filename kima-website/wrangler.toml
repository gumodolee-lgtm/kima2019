name = "kima-website"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

pages_build_output_dir = ".vercel/output/static"

# Cloudflare Workers Cron Triggers
# KST 09:00 = UTC 00:00
[[triggers.crons]]
cron = "0 0 * * *"

# 환경변수는 Cloudflare 대시보드에서 설정:
# Workers & Pages → kima-website → Settings → Variables and Secrets
# 필요한 변수: DATABASE_URL, NEXTAUTH_SECRET, SMTP_HOST, SMTP_PORT,
#              SMTP_USER, SMTP_PASSWORD, ADMIN_EMAIL, CRON_SECRET,
#              NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY,
#              NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
